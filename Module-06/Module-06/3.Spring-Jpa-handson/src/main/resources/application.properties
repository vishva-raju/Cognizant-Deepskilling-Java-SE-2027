# =====================================================================
# Spring Framework and application log
# =====================================================================
logging.level.org.springframework=info
logging.level.com.cognizant=debug

# Hibernate logs for displaying executed SQL, input and output
logging.level.org.hibernate.SQL=trace
logging.level.org.hibernate.type.descriptor.sql=trace

# Log pattern
logging.pattern.console=%d{dd-MM-yy} %d{HH:mm:ss.SSS} %-20.20thread %5p %-25.25logger{25} %25M %4L %m%n

# =====================================================================
# Database configuration (MySQL)
# =====================================================================
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/ormlearn
spring.datasource.username=root
spring.datasource.password=root

# =====================================================================
# Hibernate configuration
# =====================================================================
# ddl-auto values: create | create-drop | update | validate
# - create       : drops existing tables/data, then creates new tables
# - validate     : checks tables/columns exist, throws exception if not found
# - update       : creates missing tables/columns, leaves existing data alone
# - create-drop  : creates tables, drops them again when the app shuts down
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL5Dialect

# =====================================================================
# OPTIONAL: H2 in-memory fallback (Hands On 1 reference setup)
# To run against H2 instead of MySQL (e.g. no local MySQL server handy),
# comment out the MySQL block above and uncomment everything below.
# With ddl-auto=update, H2 will auto-create the "country" table from the
# Country entity, so you can skip manually running the CREATE TABLE script.
# =====================================================================
