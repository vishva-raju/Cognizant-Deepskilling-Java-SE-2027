# ============================================================
# Exercise 1: Spring Boot + H2 Database Configuration
# Exercise 9: Externalized Configuration
# ============================================================

# --- Primary H2 DataSource ---
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password

# --- JPA / Hibernate ---
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Exercise 10: Hibernate dialect + batch processing
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.generate_statistics=true

# H2 Console (useful for debugging)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Exercise 7: JPA Auditing
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# App info
app.name=Employee Management System
app.version=1.0.0
